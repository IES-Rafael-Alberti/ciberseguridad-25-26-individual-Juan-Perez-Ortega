# =========================================================
# APARTADO: DAST - OWASP ZAP BASELINE
# Análisis dinámico sobre la aplicación desplegada en Render.
# Se invoca Docker directamente (la acción zaproxy/action-baseline
# presenta issues conocidos con permisos y upload-artifact@v4).
# =========================================================

name: Security - OWASP ZAP DAST

on:
  workflow_dispatch:
  schedule:
    - cron: '30 3 * * 1'  # Lunes 03:30 UTC — escaneo semanal

jobs:
  zap-baseline:
    name: OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preparar directorio de reporte
        run: |
          mkdir -p zap-report
          chmod 777 zap-report

      - name: Ejecutar OWASP ZAP Baseline
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/zap-report:/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
              -t https://clinica-veterinaria-rxnp.onrender.com \
              -J report_json.json \
              -w report_md.md \
              -r report_html.html \
              -a || true

      - name: Subir reporte ZAP
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap-report/
