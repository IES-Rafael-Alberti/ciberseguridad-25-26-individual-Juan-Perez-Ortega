# =========================================================
# APARTADO: RCA - OWASP DEPENDENCY CHECK
# Workflow de GitHub Actions que ejecuta análisis de composición
# de software (SCA) sobre las dependencias Python del proyecto.
# El SAST con SonarCloud se documenta en sonar-project.properties
# y se ejecuta manualmente desde el dashboard (evita requerir
# SONAR_TOKEN en el repositorio del centro educativo).
# =========================================================

name: Security - OWASP Dependency Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'  # Lunes 03:00 UTC — escaneo semanal programado

jobs:
  dependency-check:
    name: OWASP Dependency Check (SCA)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Copiar requirements.txt a la raíz
        # La acción no maneja bien rutas con espacios; copiamos el fichero
        # a la raíz del workspace para un escaneo limpio.
        run: cp "Puesta en Produccion Segura/Despliegue seguro de aplicación web/requirements.txt" ./requirements.txt

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'clinica-veterinaria'
          path: '.'
          format: 'HTML'
          out: 'reports'
          args: >-
            --failOnCVSS 7
            --enableExperimental

      - name: Subir reporte
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports
