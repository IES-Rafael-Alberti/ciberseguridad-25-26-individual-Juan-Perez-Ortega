# =========================================================
# APARTADO: RCA - OWASP DEPENDENCY CHECK
# Workflow de GitHub Actions que ejecuta análisis de composición
# de software (SCA) sobre las dependencias Python del proyecto.
# Complementa al SAST de SonarQube con análisis de CVEs conocidas.
# =========================================================

name: Security - OWASP Dependency Check & SAST

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'  # Lunes 03:00 UTC — escaneo semanal programado

jobs:
  dependency-check:
    name: OWASP Dependency Check (SCA)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        working-directory: "Puesta en Produccion Segura/Despliegue seguro de aplicación web"
        run: pip install -r requirements.txt

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'clinica-veterinaria'
          path: 'Puesta en Produccion Segura/Despliegue seguro de aplicación web'
          format: 'HTML'
          out: 'reports'
          args: >-
            --failOnCVSS 7
            --enableExperimental

      - name: Subir reporte
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports

  sonarcloud:
    name: SonarCloud SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: "Puesta en Produccion Segura/Despliegue seguro de aplicación web"
