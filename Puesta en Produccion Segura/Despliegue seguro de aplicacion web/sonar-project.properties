# =========================================================
# APARTADO: SAST - SONARQUBE
# Configuración para análisis estático de seguridad (SAST).
# Ejecutar con: sonar-scanner  (tras `export SONAR_TOKEN=...`)
# =========================================================

sonar.projectKey=clinica-veterinaria
sonar.projectName=Clinica Veterinaria FastAPI
sonar.projectVersion=1.0

# Código fuente
sonar.sources=app
sonar.language=py
sonar.sourceEncoding=UTF-8

# Exclusiones
sonar.exclusions=**/__pycache__/**,**/venv/**,**/.venv/**,**/tests/**

# SonarCloud / SonarQube server
sonar.host.url=https://sonarcloud.io
sonar.organization=juan-perez-ortega

# Reglas de seguridad (Python security hotspots activos por defecto)
sonar.python.version=3.11
