# =============================================================
# Pipeline Logstash — SIEM Lab
# Flujo: Filebeat → Logstash → Elasticsearch
# =============================================================

input {
  beats {
    port => 5044
  }
}

filter {

  # Parseamos el JSON de Suricata que viene en el campo message
  json {
    source => "message"
  }

  # Normalizamos el timestamp de Suricata como timestamp del evento en Kibana
  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }
  }

  # Descartamos eventos que no sean alertas (flujos, estadísticas, etc.)
  # El campo event_type viene en la raíz del evento porque Filebeat
  # usa json.keys_under_root: true
  if [event_type] != "alert" {
    drop {}
  }

}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "suricata-%{+YYYY.MM.dd}"
  }
}
